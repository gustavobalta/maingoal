<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracker de Atividades</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Sora:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F4F2EC;
      --card: #FFFFFF;
      --border: rgba(0,0,0,0.12);
      --border-med: rgba(0,0,0,0.22);
      --text: #1A1A18;
      --muted: #5F5E5A;
      --hint: #888780;
      --radius: 8px;
      --radius-lg: 12px;
      --accent: #185FA5;
      --accent-light: #E6F1FB;
      --success: #3B6D11;
      --success-light: #EAF3DE;
      --warning: #854F0B;
      --warning-light: #FAEEDA;
      --danger: #A32D2D;
      --danger-light: #FCEBEB;
      --purple: #534AB7;
      --purple-light: #EEEDFE;
      --gray-light: #F1EFE8;
      --bg-secondary: #F1EFE8;
      font-family: 'Sora', sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1A1A18;
        --card: #242422;
        --border: rgba(255,255,255,0.1);
        --border-med: rgba(255,255,255,0.2);
        --text: #F1EFE8;
        --muted: #B4B2A9;
        --hint: #888780;
        --accent: #378ADD;
        --accent-light: #042C53;
        --success-light: #173404;
        --success: #97C459;
        --warning-light: #412402;
        --warning: #EF9F27;
        --danger-light: #501313;
        --danger: #F09595;
        --purple: #AFA9EC;
        --purple-light: #26215C;
        --gray-light: #2C2C2A;
        --bg-secondary: #2C2C2A;
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    .page-header {
      margin-bottom: 2rem;
    }

    .page-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-top: 4px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .form-card {
      background: var(--card);
      border: 0.5px solid var(--border-med);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 540px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
    }

    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
    }

    input, select, textarea {
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      width: 100%;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(24, 95, 165, 0.15);
    }

    input::placeholder { color: var(--hint); }

    .mono { font-family: 'JetBrains Mono', monospace; }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 9px 20px;
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.98); }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 0.5px solid var(--border-med);
      border-radius: var(--radius);
      padding: 9px 16px;
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-ghost:hover { background: var(--bg-secondary); }

    .btn-export {
      background: transparent;
      color: var(--muted);
      border: 0.5px solid var(--border-med);
      border-radius: var(--radius);
      padding: 9px 16px;
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
      margin-left: auto;
    }
    .btn-export:hover { background: var(--bg-secondary); }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
      text-align: center;
    }

    .stat-num { font-size: 24px; font-weight: 600; color: var(--text); }
    .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .count-badge {
      font-size: 11px;
      font-weight: 500;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 20px;
      padding: 2px 10px;
    }

    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-row input { flex: 1; min-width: 160px; }

    select.filter-select {
      width: auto;
      min-width: 140px;
    }

    .tasks-list { display: flex; flex-direction: column; gap: 8px; }

    .task-card {
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      position: relative;
      transition: border-color 0.15s, background 0.1s;
    }

    .task-card:hover { border-color: var(--border-med); }

    .task-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      gap: 8px;
    }

    .task-empresa {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--hint);
    }

    .task-jira {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-light);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .task-funcional {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.45;
      padding-right: 24px;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .task-date {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border-med); display: inline-block; }

    .status-badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 9px;
      border-radius: 20px;
      letter-spacing: 0.03em;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.15s;
    }
    .status-badge:hover { opacity: 0.75; }

    .s-backlog    { background: var(--gray-light);   color: #5F5E5A; }
    .s-andamento  { background: var(--accent-light);  color: var(--accent); }
    .s-revisao    { background: var(--purple-light);  color: var(--purple); }
    .s-aguardando { background: var(--warning-light); color: var(--warning); }
    .s-concluido  { background: var(--success-light); color: var(--success); }
    .s-bloqueado  { background: var(--danger-light);  color: var(--danger); }

    .del-btn {
      position: absolute;
      top: 10px; right: 10px;
      background: none;
      border: none;
      color: var(--hint);
      cursor: pointer;
      font-size: 14px;
      padding: 3px 6px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .task-card:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: var(--danger); background: var(--danger-light); }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: 14px;
      border: 0.5px dashed var(--border-med);
      border-radius: var(--radius-lg);
    }

    .empty-icon { font-size: 28px; margin-bottom: 8px; }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--text);
      color: var(--bg);
      font-size: 13px;
      padding: 8px 18px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="container">

    <div class="page-header">
      <h1 class="page-title">Tracker de Atividades</h1>
      <p class="page-subtitle">Registre e acompanhe o que está sendo feito</p>
    </div>

    <p class="section-label">Nova atividade</p>

    <div class="form-card">
      <div class="form-grid">
        <div class="form-group">
          <label for="f-empresa">Empresa</label>
          <input type="text" id="f-empresa" placeholder="ex: MAINGOAL" />
        </div>
        <div class="form-group">
          <label for="f-jira">Ticket Jira</label>
          <input type="text" id="f-jira" placeholder="ex: YFI00577" class="mono" />
        </div>
        <div class="form-group full">
          <label for="f-funcional">Funcional / Descrição</label>
          <input type="text" id="f-funcional" placeholder="Descreva o que está sendo feito..." />
        </div>
        <div class="form-group">
          <label for="f-data">Recebido em</label>
          <input type="date" id="f-data" />
        </div>
        <div class="form-group">
          <label for="f-status">Status</label>
          <select id="f-status">
            <option value="backlog">Backlog</option>
            <option value="andamento" selected>Em andamento</option>
            <option value="revisao">Em revisão</option>
            <option value="aguardando">Aguardando retorno</option>
            <option value="concluido">Concluído</option>
            <option value="bloqueado">Bloqueado</option>
          </select>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-primary" onclick="addTask()">+ Adicionar</button>
        <button class="btn-ghost" onclick="clearForm()">Limpar</button>
        <button class="btn-export" onclick="exportCSV()">↓ Exportar CSV</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="st-total">0</div>
        <div class="stat-lbl">Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="st-andamento">0</div>
        <div class="stat-lbl">Em andamento</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="st-concluido">0</div>
        <div class="stat-lbl">Concluídos</div>
      </div>
    </div>

    <div class="list-header">
      <p class="section-label" style="margin:0;">Atividades registradas</p>
      <span class="count-badge" id="count-badge">0 registros</span>
    </div>

    <div class="search-row">
      <input type="text" id="search-input" placeholder="Buscar por empresa, jira ou funcional..." oninput="renderList()" />
      <select class="filter-select" id="filter-status" onchange="renderList()">
        <option value="">Todos os status</option>
        <option value="backlog">Backlog</option>
        <option value="andamento">Em andamento</option>
        <option value="revisao">Em revisão</option>
        <option value="aguardando">Aguardando retorno</option>
        <option value="concluido">Concluído</option>
        <option value="bloqueado">Bloqueado</option>
      </select>
    </div>

    <div class="tasks-list" id="tasks-list"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STATUS_MAP = {
      backlog:    { label: 'Backlog',            cls: 's-backlog',    next: 'andamento' },
      andamento:  { label: 'Em andamento',       cls: 's-andamento',  next: 'revisao' },
      revisao:    { label: 'Em revisão',         cls: 's-revisao',    next: 'concluido' },
      aguardando: { label: 'Aguardando retorno', cls: 's-aguardando', next: 'andamento' },
      concluido:  { label: 'Concluído',          cls: 's-concluido',  next: 'backlog' },
      bloqueado:  { label: 'Bloqueado',          cls: 's-bloqueado',  next: 'andamento' },
    };

    const STATUS_ORDER = ['backlog','andamento','revisao','aguardando','concluido','bloqueado'];

    let tasks = [];
    try { tasks = JSON.parse(localStorage.getItem('tracker_atividades') || '[]'); } catch(e) {}

    function save() {
      try { localStorage.setItem('tracker_atividades', JSON.stringify(tasks)); } catch(e) {}
    }

    function todayStr() {
      return new Date().toISOString().split('T')[0];
    }

    function fmtDate(d) {
      if (!d) return '—';
      const [y, m, day] = d.split('-');
      return `${day}/${m}/${y}`;
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function addTask() {
      const empresa   = document.getElementById('f-empresa').value.trim();
      const jira      = document.getElementById('f-jira').value.trim().toUpperCase();
      const funcional = document.getElementById('f-funcional').value.trim();
      const data      = document.getElementById('f-data').value;
      const status    = document.getElementById('f-status').value;

      if (!funcional) {
        document.getElementById('f-funcional').focus();
        return;
      }

      tasks.unshift({ id: Date.now(), empresa, jira, funcional, data, status });
      save();
      clearForm();
      renderList();
      showToast('Atividade adicionada');
    }

    function clearForm() {
      ['f-empresa','f-jira','f-funcional'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('f-data').value = todayStr();
      document.getElementById('f-status').value = 'andamento';
      document.getElementById('f-funcional').focus();
    }

    function deleteTask(id) {
      if (!confirm('Remover esta atividade?')) return;
      tasks = tasks.filter(t => t.id !== id);
      save();
      renderList();
      showToast('Atividade removida');
    }

    function cycleStatus(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      const idx = STATUS_ORDER.indexOf(task.status);
      task.status = STATUS_ORDER[(idx + 1) % STATUS_ORDER.length];
      save();
      renderList();
      showToast('Status: ' + STATUS_MAP[task.status].label);
    }

    function exportCSV() {
      if (!tasks.length) { showToast('Nenhuma atividade para exportar'); return; }
      const header = ['Empresa','Jira','Funcional','Recebido em','Status'];
      const rows = tasks.map(t => [
        t.empresa, t.jira, t.funcional, fmtDate(t.data), STATUS_MAP[t.status]?.label || t.status
      ]);
      const csv = [header, ...rows].map(r => r.map(c => `"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `atividades_${todayStr()}.csv`;
      a.click();
      showToast('CSV exportado');
    }

    function renderList() {
      const q  = document.getElementById('search-input').value.toLowerCase();
      const sf = document.getElementById('filter-status').value;

      let filtered = tasks.filter(t => {
        const matchQ = !q || [t.empresa, t.jira, t.funcional].join(' ').toLowerCase().includes(q);
        const matchS = !sf || t.status === sf;
        return matchQ && matchS;
      });

      const n = filtered.length;
      document.getElementById('count-badge').textContent = `${n} registro${n !== 1 ? 's' : ''}`;
      document.getElementById('st-total').textContent     = tasks.length;
      document.getElementById('st-andamento').textContent = tasks.filter(t => t.status === 'andamento').length;
      document.getElementById('st-concluido').textContent = tasks.filter(t => t.status === 'concluido').length;

      const list = document.getElementById('tasks-list');

      if (!filtered.length) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            ${tasks.length ? 'Nenhuma atividade encontrada para o filtro.' : 'Nenhuma atividade registrada ainda.'}
          </div>`;
        return;
      }

      list.innerHTML = filtered.map(t => {
        const s = STATUS_MAP[t.status] || STATUS_MAP['backlog'];
        return `
          <div class="task-card">
            <button class="del-btn" onclick="deleteTask(${t.id})" title="Remover">✕</button>
            <div class="task-top">
              <span class="task-empresa">${t.empresa || '—'}</span>
              ${t.jira ? `<span class="task-jira">${t.jira}</span>` : ''}
            </div>
            <div class="task-funcional">${t.funcional}</div>
            <div class="task-meta">
              <span class="status-badge ${s.cls}" onclick="cycleStatus(${t.id})" title="Clique para avançar o status">${s.label}</span>
              ${t.data ? `<span class="dot"></span><span class="task-date">Recebido ${fmtDate(t.data)}</span>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    document.getElementById('f-data').value = todayStr();
    document.getElementById('f-jira').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('f-funcional').focus(); });
    document.getElementById('f-funcional').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

    renderList();
  </script>
</body>
</html>
